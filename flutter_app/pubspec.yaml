name: gym_automation
description: Gym Automation System - Flutter App with MongoDB & JWT Auth
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Utils
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  loading_animation_widget: ^1.2.0+4
  
  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.4
  
  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # Image Picker
  image_picker: ^1.0.5
  
  # URL Launcher
  url_launcher: ^6.2.2
  web: ^1.1.1
  js: ^0.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/gym_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
